<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro - ecomarket-ai</title>
  <meta name="description" content="Únete a ecomarket-ai y accede a tu Radar Financiero Cognitivo"/>
  
  <!-- Fuentes Google (URLs limpias, sin espacios) -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --accent-cyan: #06b6d4;
      --accent-purple: #8b5cf6;
      --accent-gradient: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --border-color: #374151;
      --error: #ef4444;
      --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container { max-width: 480px; width: 100%; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo a {
      color: var(--text-primary);
      text-decoration: none;
      font-size: 1.5rem;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .card {
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .card h1 { font-size: 1.75rem; margin-bottom: 0.5rem; text-align: center; }
    .card p { color: var(--text-secondary); text-align: center; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 500; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid var(--border-color);
      border-radius: 10px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent-cyan); }
    .btn {
      width: 100%;
      padding: 1rem;
      background: var(--accent-gradient);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .divider { display: flex; align-items: center; margin: 1.5rem 0; color: var(--text-secondary); font-size: 0.875rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }
    .divider span { padding: 0 1rem; }
    .btn-secondary {
      width: 100%;
      padding: 0.875rem;
      background: transparent;
      color: var(--text-primary);
      border: 2px solid var(--border-color);
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent-cyan); }
    .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.875rem; }
    .alert-error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--error); color: var(--error); }
    .alert-success { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); color: var(--success); }
    .text-center { text-align: center; }
    .mt-4 { margin-top: 1.5rem; }
    a { color: var(--accent-cyan); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">
      <a href="/">← ecomarket-ai</a>
    </div>
    <div class="card">
      <h1>Crear cuenta</h1>
      <p>Accede a tu Radar Financiero Cognitivo</p>
      <div id="alertContainer"></div>
      <form id="registerForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="tu@email.com" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required placeholder="Mínimo 8 caracteres" minlength="8" />
        </div>
        <div class="form-group">
          <label for="full_name">Nombre completo (opcional)</label>
          <input type="text" id="full_name" placeholder="Tu nombre" />
        </div>
        <div class="form-group">
          <label for="experience_level">Nivel de experiencia</label>
          <select id="experience_level" required>
            <option value="">Selecciona...</option>
            <option value="principiante">Principiante (menos de 1 año)</option>
            <option value="intermedio">Intermedio (1-3 años)</option>
            <option value="avanzado">Avanzado (más de 3 años)</option>
          </select>
        </div>
        <button type="submit" class="btn" id="submitBtn">Crear cuenta</button>
      </form>
      <div class="divider"><span>¿Ya tienes cuenta?</span></div>
      <button onclick="window.location.href='/login.html'" class="btn-secondary">Iniciar sesión</button>
      <p class="text-center mt-4"><a href="/">← Volver al inicio</a></p>
    </div>
  </div>

  <!-- Supabase (URL limpia, sin espacios) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // 🔑 CONFIGURACIÓN - TUS DATOS DE SUPABASE (URL sin espacios al final)
    const SUPABASE_URL = 'https://huvnjjarkycddhxkwsna.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1dm5qamFya3ljZGRoeGt3c25hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzEwNjYsImV4cCI6MjA4ODQwNzA2Nn0.LyTXYZgQ254aiQFaO5u1RnAqHkhrpI6Qjso0bH3rn8w';
    
    // Declaración ÚNICA de supabase
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('registerForm');
    const alertContainer = document.getElementById('alertContainer');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(message, type = 'error') {
      alertContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const full_name = document.getElementById('full_name').value.trim();
      const experience_level = document.getElementById('experience_level').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creando cuenta...';

      try {
        const { data: authData, error: authError } = await supabase.auth.signUp({
          email,
          password,
          options: { data: { full_name } }
        });

        if (authError) throw authError;
        if (!authData.user) throw new Error('Error al crear la cuenta');

        const { error: profileError } = await supabase
          .from('user_profiles')
          .insert([{
            user_id: authData.user.id,
            email: email,
            full_name: full_name || null,
            experience_level: experience_level,
            subscription_plan: 'free',
            subscription_status: 'active'
          }]);

        if (profileError) throw profileError;

        showAlert('✅ Cuenta creada. Revisa tu email para verificar.', 'success');
        form.reset();
        submitBtn.textContent = 'Cuenta creada ✓';

        setTimeout(() => { window.location.href = '/dashboard.html'; }, 2000);

      } catch (error) {
        console.error('Error:', error);
        let message = 'Error al crear la cuenta';
        
        if (error.message?.includes('User already registered')) {
          message = 'Este email ya está registrado';
        } else if (error.message?.includes('password')) {
          message = 'La contraseña debe tener al menos 8 caracteres';
        }
        showAlert(message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Crear cuenta';
      }
    });
  </script>
</body>
</html>
