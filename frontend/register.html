<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - ecomarket-ai</title>
    <meta name="description" content="Crea tu cuenta en ecomarket-ai">
    
    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- 1. LIBRERÍA SUPABASE (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <a href="index.html" class="back-link">← ecomarket-ai</a>
        
        <div class="auth-card">
            <h1>Crear cuenta</h1>
            <p class="auth-subtitle">Accede a tu Radar Financiero Cognitivo</p>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" required placeholder="tu@email.com">
                </div>
                
                <div class="form-group">
                    <label for="registerPassword">Contraseña</label>
                    <input type="password" id="registerPassword" required placeholder="Mínimo 6 caracteres" minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="registerName">Nombre completo (opcional)</label>
                    <input type="text" id="registerName" placeholder="Tu nombre">
                </div>
                
                <div class="form-group">
                    <label for="registerExperience">Nivel de experiencia</label>
                    <select id="registerExperience">
                        <option value="">Selecciona...</option>
                        <option value="beginner">Principiante (menos de 1 año)</option>
                        <option value="intermediate">Intermedio (1-3 años)</option>
                        <option value="advanced">Avanzado (más de 3 años)</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">Crear cuenta</button>
            </form>
            
            <p class="auth-footer">
                ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
            </p>
        </div>
        
        <a href="index.html" class="back-home">← Volver al inicio</a>
    </div>

    <!-- 2. CONEXIÓN SUPABASE -->
    <script src="js/supabase-client.js"></script>
    
    <!-- 3. LÓGICA DE AUTENTICACIÓN -->
    <script src="js/auth.js"></script>
    
    <!-- 4. LÓGICA GENERAL -->
    <script src="js/app.js"></script>
</body>
</html>
