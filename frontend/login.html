<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ecomarket-ai</title>
    <meta name="description" content="Inicia sesión en tu Radar Financiero Cognitivo">
    
    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- 1. LIBRERÍA SUPABASE (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <a href="index.html" class="back-link">← ecomarket-ai</a>
        
        <div class="auth-card">
            <h1>Bienvenido de vuelta</h1>
            <p class="auth-subtitle">Inicia sesión en tu Radar Financiero Cognitivo</p>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" required placeholder="tu@email.com">
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                
                <div class="form-extra">
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">Iniciar sesión</button>
            </form>
            
            <p class="auth-footer">
                ¿No tienes cuenta? <a href="register.html">Crear una</a>
            </p>
        </div>
        
        <a href="index.html" class="back-home">← Volver al inicio</a>
    </div>

    <!-- 2. CONEXIÓN SUPABASE -->
    <script src="js/supabase-client.js"></script>
    
    <!-- 3. LÓGICA DE AUTENTICACIÓN -->
    <script src="js/auth.js"></script>
    
    <!-- 4. LÓGICA GENERAL -->
    <script src="js/app.js"></script>
</body>
</html>
