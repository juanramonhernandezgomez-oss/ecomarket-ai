<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - ecomarket-ai</title>
  <meta name="description" content="Inicia sesión en tu Radar Financiero Cognitivo"/>
  
  <!-- Fuentes Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --accent-cyan: #06b6d4;
      --accent-purple: #8b5cf6;
      --accent-gradient: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --border-color: #374151;
      --error: #ef4444;
      --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 480px;
      width: 100%;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo a {
      color: var(--text-primary);
      text-decoration: none;
      font-size: 1.5rem;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .card h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .card p {
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid var(--border-color);
      border-radius: 10px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }

    .btn {
      width: 100%;
      padding: 1rem;
      background: var(--accent-gradient);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .alert {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
    }

    .text-center { text-align: center; }
    .mt-4 { margin-top: 1.5rem; }
    .mb-4 { margin-bottom: 1.5rem; }

    a {
      color: var(--accent-cyan);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .forgot-password {
      text-align: right;
      font-size: 0.875rem;
      margin-top: -1rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">
      <a href="/">← ecomarket-ai</a>
    </div>

    <div class="card">
      <h1>Bienvenido de vuelta</h1>
      <p>Inicia sesión en tu Radar Financiero Cognitivo</p>

      <div id="alertContainer"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="tu@email.com" />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required placeholder="Tu contraseña" />
        </div>

        <div class="forgot-password">
          <a href="#" onclick="handleForgotPassword()">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn" id="submitBtn">Iniciar sesión</button>
      </form>

      <p class="text-center mt-4">
        ¿No tienes cuenta? <a href="/register.html">Crear una</a>
      </p>

      <p class="text-center">
        <a href="/">← Volver al inicio</a>
      </p>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
// 🔑 CONFIGURACIÓN - REEMPLAZA CON TUS DATOS DE SUPABASE
    const SUPABASE_URL = 'https://huvnjjarkycddhxkwsna.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1dm5qamFya3ljZGRoeGt3c25hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzEwNjYsImV4cCI6MjA4ODQwNzA2Nn0.LyTXYZgQ254aiQFaO5u1RnAqHkhrpI6Qjso0bH3rn8w';

    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('loginForm');
    const alertContainer = document.getElementById('alertContainer');
    const submitBtn = document.getElementById('submitBtn');

    // Verificar si ya está logueado
    async function checkSession() {
      const {  { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.href = '/dashboard.html';
      }
    }

    checkSession();

    function showAlert(message, type = 'error') {
      alertContainer.innerHTML = `
        <div class="alert alert-${type}">${message}</div>
      `;
    }

    async function handleForgotPassword() {
      const email = document.getElementById('email').value;
      
      if (!email) {
        showAlert('Por favor, introduce tu email primero', 'error');
        return;
      }

      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: 'https://ecomarket-ai.es/reset-password.html',
        });

        if (error) throw error;

        showAlert('✅ Email de recuperación enviado. Revisa tu bandeja de entrada.', 'success');
      } catch (error) {
        showAlert('Error al enviar email de recuperación', 'error');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Iniciando sesión...';

      try {
        const {  { user, session }, error } = await supabase.auth.signInWithPassword({
          email,
          password,
        });

        if (error) throw error;
        if (!user) throw new Error('Error al iniciar sesión');

        // Éxito
        showAlert('✅ Sesión iniciada correctamente. Redirigiendo...', 'success');
        submitBtn.textContent = 'Iniciando sesión ✓';

        // Redirigir al dashboard
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 1000);

      } catch (error) {
        console.error('Error:', error);
        
        let message = 'Error al iniciar sesión';
        
        if (error.message.includes('Invalid login credentials')) {
          message = 'Email o contraseña incorrectos';
        } else if (error.message.includes('Email not confirmed')) {
          message = 'Por favor, verifica tu email antes de iniciar sesión';
        }

        showAlert(message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Iniciar sesión';
      }
    });
  </script>

</body>
</html>
