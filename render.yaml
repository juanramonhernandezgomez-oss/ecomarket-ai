ecomarket-ai# render.yaml - Blueprint para ecomarket-ai
services:
  - type: web
    name: ecomarket-ai
    env: static
    rootDir: frontend
    buildCommand: ""
    publishPath: ./
    
    domains:
      - ecomarket-ai.es
      - www.ecomarket-ai.es
    
    # Redirección: raíz → www
    redirects:
      - source: /*
        destination: https://www.ecomarket-ai.es/:splat
        status: 301
        condition:
          host: ecomarket-ai.es
    
    # Headers de seguridad
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains