# render.yaml
# Blueprint para ecomarket-ai - Radar Financiero Cognitivo
# Generado: Marzo 2026

services:
  # Static Site para Landing Page (Frontend HTML/CSS/JS)
  - type: web
    name: ecomarket-ai
    env: static
    rootDir: frontend
    buildCommand: ""
    publishPath: ./
    
    # Dominios personalizados
    domains:
      - ecomarket-ai.es
      - www.ecomarket-ai.es
    
    # Variables de entorno (vacías para sitio estático)
    envVars: []
    
    # Headers de seguridad para Fintech
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: Content-Security-Policy
        value: default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; connect-src 'self' https://*.supabase.co; img-src 'self' data: https:;
    
    # Redirección: raíz → www
    redirects:
      - source: /*
        destination: https://www.ecomarket-ai.es/:splat
        status: 301
        condition:
          host: ecomarket-ai.es
    
    # Configuración de caché para assets estáticos
    cacheControl:
      - path: /*.html
        maxAge: 0
        mustRevalidate: true
      - path: /*.{css,js,png,jpg,jpeg,svg,webp,ico,woff,woff2}
        maxAge: 31536000
        immutable: true

